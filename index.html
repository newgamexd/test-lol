<script>
async function getClubMembers() {
  const res = await fetch(
    "https://api.chess.com/pub/club/blunder-master-vn"
  );

  const data = await res.json();

  return data.members_count;
}

async function checkWeeklyIncrease() {
  const current = await getClubMembers();

  // lấy dữ liệu tuần trước đã lưu
  const old = Number(localStorage.getItem("oldMembers")) || current;

  // tính số tăng
  const increased = current - old;

  console.log("Hiện tại:", current);
  console.log("Tăng trong 1 tuần:", increased);

  // lưu lại sau 1 tuần
  setTimeout(() => {
    localStorage.setItem("oldMembers", current);
  }, 7 * 24 * 60 * 60 * 1000);
}

checkWeeklyIncrease();
</script>
